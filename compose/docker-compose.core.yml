services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ../services/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    networks:
      - robot-core

  netstatus:
    image: python:3.12-slim
    container_name: netstatus
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../services/netstatus:/app:ro
    environment:
      NETSTATUS_HOST: "0.0.0.0"
      NETSTATUS_PORT: "8081"
    command: ["python", "main.py"]
    networks:
      - robot-core

  dashboard:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    container_name:  robot-dashboard
    restart: unless-stopped
    volumes:
      - ../site:/usr/share/nginx/html:ro
      - ../docker/nginx-dashboard.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - netstatus
      - motion_status
      - camera_server
    networks:
      - robot-core

  roboclaw_driver:
    build: ../services/roboclaw_driver
    restart: unless-stopped
    depends_on:
      - mosquitto
    # Share network with mosquitto so MQTT is just localhost
    network_mode: "service:mosquitto"
    environment:
      MQTT_HOST: "127.0.0.1"
      MQTT_PORT: "1883"
      MQTT_TOPIC_CMD: "robot/motion/command"
      ROBOCLAW_PORT: "/dev/ttyACM0"
      ROBOCLAW_BAUD: "38400"
      ROBOCLAW_ADDRESS: "128"
    devices:
      - "/dev/serial/by-id/usb-Basicmicro_Inc._USB_Roboclaw_2x30A-if00:/dev/ttyACM0"

  motion_status:
    build:
      context: ../services/motion_status
    container_name: motion_status
    restart: unless-stopped
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC_STATUS=robot/motion/status
      - MQTT_TOPIC_CMD=robot/motion/command
    ports:
      - "8000:8000"
    networks:
      - robot-core

  camera_server:
    build:
      context: ../services/camera_server
    container_name: camera_server
    restart: unless-stopped
    environment:
      - CAMERA_DEVICE=/dev/video0
      - FRAME_WIDTH=640
      - FRAME_HEIGHT=480
      - FRAME_FPS=15
      - JPEG_QUALITY=70
    devices:
      - "/dev/video0:/dev/video0"
    ports:
      - "8090:8080"
    networks:
      - robot-core

volumes:
  mosquitto_data:

networks:
  robot-core:
    driver: bridge
