services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ../services/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    networks:
      - robot-core

  netstatus:
    image: python:3.12-slim
    container_name: netstatus
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../services/netstatus:/app:ro
    environment:
      NETSTATUS_HOST: "0.0.0.0"
      NETSTATUS_PORT: "8081"
      ROBOT_NAME: "O.S.C.A.R."
    command: ["python", "main.py"]
    networks:
      - robot-core

  dashboard:
    image: nginx:1.27-alpine
    ports:
      - "443:443"
    container_name: robot-dashboard
    restart: unless-stopped
    volumes:
      - ../site:/usr/share/nginx/html:ro
      - ../docker/nginx-dashboard.conf:/etc/nginx/conf.d/default.conf:ro
      - ../docker/certs:/etc/nginx/certs:ro
      - ../docker/nginx.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - netstatus
      - motion_status
      - camera_server
    networks:
      - robot-core

  roboclaw_driver:
    build: ../services/roboclaw_driver
    container_name: roboclaw_driver
    restart: unless-stopped
    depends_on:
      - mosquitto
    # Share network with mosquitto so MQTT is just localhost
    network_mode: "service:mosquitto"
    environment:
      MQTT_HOST: "127.0.0.1"
      MQTT_PORT: "1883"
      MQTT_TOPIC_CMD: "robot/motion/command"
      ROBOCLAW_PORT: "/dev/ttyACM0"
      ROBOCLAW_BAUD: "38400"
      ROBOCLAW_ADDRESS: "128"
    devices:
      - "/dev/serial/by-id/usb-Basicmicro_Inc._USB_Roboclaw_2x30A-if00:/dev/ttyACM0"

  motion_status:
    build:
      context: ../services/motion_status
    container_name: motion_status
    restart: unless-stopped
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC_STATUS=robot/motion/status
      - MQTT_TOPIC_CMD=robot/motion/command
    ports:
      - "8000:8000"
    networks:
      - robot-core

  motion_controller:
    build:
      context: ../services/motion_controller
    container_name: motion_controller
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC_VOICE_CMD=robot/voice/command
      - MQTT_TOPIC_MOTION_CMD=robot/motion/command
      - MQTT_TOPIC_SAFETY_STOP=robot/safety/stop
      - MQTT_TOPIC_MOTION_STATUS=robot/motion/status
      - LOG_LEVEL=INFO
    networks:
      - robot-core

  camera_server:
    build:
      context: ../services/camera_server
    container_name: camera_server
    restart: unless-stopped
    environment:
      - CAMERA_DEVICE=/dev/video0
      - FRAME_WIDTH=640
      - FRAME_HEIGHT=480
      - FRAME_FPS=15
      - JPEG_QUALITY=70
    devices:
      - "/dev/video0:/dev/video0"
    ports:
      - "8090:8080"
    networks:
      - robot-core

  dialogue_router:
    build:
      context: ../services/dialogue_router
    container_name: dialogue_router
    restart: unless-stopped
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=claude-sonnet-4-6
      - MEMORY_PATH=/data/oscar_memory.json
      - HISTORY_WINDOW=20
    volumes:
      - oscar_memory:/data
    depends_on:
      - mosquitto
    networks:
      - robot-core

  lidar_publisher:
    build: ../lidar
    container_name: lidar_publisher
    restart: unless-stopped
    depends_on:
      - mosquitto
    devices:
      - "${LIDAR_PORT:-/dev/rplidar}:/dev/rplidar"
    environment:
      LIDAR_PORT: "/dev/rplidar"
      MQTT_HOST: "mosquitto"
      MQTT_PORT: "1883"
      LIDAR_BAUDRATE: "${LIDAR_BAUDRATE:-115200}"
      LIDAR_SCAN_MODE: "${LIDAR_SCAN_MODE:-normal}"
      LIDAR_PUBLISH_HZ: "${LIDAR_PUBLISH_HZ:-5}"
      LIDAR_MIN_QUALITY: "${LIDAR_MIN_QUALITY:-10}"
      LIDAR_HEALTH_INTERVAL: "${LIDAR_HEALTH_INTERVAL:-30}"
    networks:
      - robot-core

  wyoming-piper:
    image: rhasspy/wyoming-piper:latest
    container_name: wyoming-piper
    restart: unless-stopped
    command: ["--voice", "en_US-lessac-medium"]
    ports:
      - "10200:10200"
    networks:
      - robot-core
    volumes:
      - wyoming_piper_data:/data

  wyoming-whisper:
    image: rhasspy/wyoming-whisper:latest
    container_name: wyoming-whisper
    restart: unless-stopped
    command: ["--model", "tiny-int8", "--language", "en"]
    ports:
      - "10300:10300"
    networks:
      - robot-core
    volumes:
      - wyoming_whisper_data:/data

  wyoming-openwakeword:
    image: rhasspy/wyoming-openwakeword:latest
    container_name: wyoming-openwakeword
    restart: unless-stopped
    command: ["--threshold", "0.4", "--refractory-seconds", "5"]
    ports:
      - "10400:10400"
    networks:
      - robot-core
    volumes:
      - wyoming_openwakeword_data:/data

  voice_gateway:
    build:
      context: ../services/voice_gateway
    container_name: voice_gateway
    restart: unless-stopped
    depends_on:
      - mosquitto
      - wyoming-piper
      - wyoming-whisper
      - wyoming-openwakeword
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - PIPER_HOST=wyoming-piper
      - PIPER_PORT=10200
      - WHISPER_HOST=wyoming-whisper
      - WHISPER_PORT=10300
      - WY_WAKE_URI=tcp://wyoming-openwakeword:10400
      - WAKE_WORD=okay_nabu
      - WAKE_BEEP_PATH=/app/sfx_beep.py
      - WAKE_COOLDOWN_SECS=3
      - STT_SECONDS_DEFAULT=5
      - APLAY_DEVICE=pulse
      - ARECORD_DEVICE=plughw:USB,0
      - STT_DEFAULT_SECONDS=5
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
    networks:
      - robot-core
    devices:
      - /dev/snd:/dev/snd
    volumes:
      - /run/user/1000/pulse:/run/user/1000/pulse

volumes:
  mosquitto_data:
  oscar_memory:
  wyoming_piper_data:
  wyoming_whisper_data:
  wyoming_openwakeword_data:

networks:
  robot-core:
    driver: bridge
