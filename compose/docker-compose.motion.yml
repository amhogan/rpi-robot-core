version: "3.9"

services:
  motion_controller:
    build:
      # Compose file is in ./compose, so go up one level to reach ./services
      context: ../services/motion_controller
      dockerfile: Dockerfile
    container_name: motion_controller
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC_VOICE_CMD=robot/voice/command
      - MQTT_TOPIC_MOTION_STATUS=robot/motion/status
      - LOG_LEVEL=INFO
    networks:
      - robot-core

networks:
  # Reuse the existing network created by the core stack
  robot-core:
    external: true
    name: compose_robot-core
