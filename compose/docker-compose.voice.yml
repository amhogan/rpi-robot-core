version: "3.9"

services:
  wyoming-piper:
    image: rhasspy/wyoming-piper:latest
    restart: unless-stopped
    command: ["--voice", "en_US-lessac-medium"]
    ports:
      - "10200:10200"
    networks:
      - robot-core
    volumes:
      - wyoming_piper_data:/data

  wyoming-whisper:
    image: rhasspy/wyoming-whisper:latest
    restart: unless-stopped
    command: ["--model", "tiny-int8", "--language", "en"]
    ports:
      - "10300:10300"
    networks:
      - robot-core
    volumes:
      - wyoming_whisper_data:/data

  wyoming-openwakeword:
    image: rhasspy/wyoming-openwakeword:latest
    restart: unless-stopped
    # No args needed — handler loads the model requested by the client via Detect event.
    # To add a custom oscar model: mount oscar.tflite and pass --custom-model-dir /custom.
    command: ["--threshold", "0.4", "--refractory-seconds", "5"]
    ports:
      - "10400:10400"
    networks:
      - robot-core
    volumes:
      - wyoming_openwakeword_data:/data

  voice_gateway:
    build:
      context: ../services/voice_gateway
    container_name: voice_gateway
    restart: unless-stopped
    depends_on:
      - wyoming-piper
      - wyoming-whisper
      - wyoming-openwakeword
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - PIPER_HOST=wyoming-piper
      - PIPER_PORT=10200
      - WHISPER_HOST=wyoming-whisper
      - WHISPER_PORT=10300
      - WY_WAKE_URI=tcp://wyoming-openwakeword:10400
      - WAKE_WORD=okay_nabu
      - WAKE_BEEP_PATH=/app/sfx_beep.py
      - WAKE_COOLDOWN_SECS=3
      - STT_SECONDS_DEFAULT=5
      - APLAY_DEVICE=plughw:USB,0
      - ARECORD_DEVICE=plughw:USB,0
      - STT_DEFAULT_SECONDS=5
    networks:
      - robot-core
    devices:
      - /dev/snd:/dev/snd

networks:
  robot-core:
    external: true
    name: compose_robot-core

volumes:
  wyoming_piper_data:
  wyoming_whisper_data:
  wyoming_openwakeword_data:
