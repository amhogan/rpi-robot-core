server {
    listen 80 default_server;
    server_name _;

    # Serve static dashboard
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Netstatus JSON
    location /status {
        proxy_pass http://netstatus:8081/status;
    }

    # RoboClaw telemetry (optional, used later)
    location /status_motion {
        proxy_pass http://motion_status:8000/status_motion;
    }

    # Motion commands – forwarded to motion_status Flask app
    location /command {
        proxy_pass http://motion_status:8000/command;
    }

    # Camera MJPEG stream
    location /video_feed {
        proxy_pass http://camera_server:8080/video.mjpg;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

}
