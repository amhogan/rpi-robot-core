# Mobile UA detection — serves mobile.html automatically to phones/tablets
map $http_user_agent $oscar_index {
    default                                                         index.html;
    "~*(android|iphone|ipod|ipad|blackberry|windows.phone|mobile)" mobile.html;
}

# Redirect all HTTP to HTTPS
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Basic auth on all endpoints
    auth_basic           "OSCAR Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Serve static dashboard — mobile devices get mobile.html automatically
    root /usr/share/nginx/html;
    index $oscar_index;

    location / {
        try_files $uri /$oscar_index;
    }

    # Netstatus JSON
    location /status {
        proxy_pass http://netstatus:8081/status;
    }

    # RoboClaw telemetry
    location /status_motion {
        proxy_pass http://motion_status:8000/status_motion;
    }

    # Motion commands – forwarded to motion_status Flask app
    location /command {
        proxy_pass http://motion_status:8000/command;
    }

    # SSE event stream (conversation log)
    location /events {
        proxy_pass http://motion_status:8000/events;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    # Camera MJPEG stream
    location /video_feed {
        proxy_pass http://camera_server:8080/video.mjpg;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # MQTT over WebSocket — used by the LIDAR dashboard panel
    location = /mqtt {
        proxy_pass http://mosquitto:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        auth_basic off;
    }
}
